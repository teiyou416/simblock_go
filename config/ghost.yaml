simulation:
  # Stress profile for checking orphan block statistics.
  # Short intervals make competing blocks much more likely than the default.
  num_nodes: 300
  block_interval: 1000
  block_size: 535000
  fork_choice: "ghost"
  end_time: 100000
  end_block_height: 1000
  java_compatible: true

network:
  profile: "bitcoin_2019"
  latency_matrix_file: "./data/latency.txt"
  upload_bandwidth: [19200000, 20700000, 5800000, 15700000, 10200000, 11300000]
  download_bandwidth: [52000000, 40000000, 18000000, 22800000, 22800000, 29900000]
  region_distribution: [0.3316, 0.4998, 0.0090, 0.1177, 0.0224, 0.0195]
  degree_distribution:
    - 0.025
    - 0.050
    - 0.075
    - 0.10
    - 0.20
    - 0.30
    - 0.40
    - 0.50
    - 0.60
    - 0.70
    - 0.80
    - 0.85
    - 0.90
    - 0.95
    - 0.97
    - 0.97
    - 0.98
    - 0.99
    - 0.995
