# Java SimBlock-like defaults.
#
# This file maps the Java version's core SimulationConfiguration values
# onto the Go version's currently supported config fields. Network profiles,
# bandwidth distributions, and CBR/churn constants are still handled in code
# when java_compatible is true.

simulation:
  # Java: NUM_OF_NODES = 300
  num_nodes: 300

  # Java: INTERVAL = 1000 * 60 * 10
  # Unit: millisecond
  block_interval: 600000

  # Java: BLOCK_SIZE = 535000
  # Unit: byte
  block_size: 535000

  # Java-compatible mode stops by block height.
  # Kept for completeness; ignored by the simulator loop in this mode.
  end_time: 100000000

  # Java: END_BLOCK_HEIGHT = 3
  end_block_height: 3

  # Enables Java-like region distribution, degree distribution, RNG,
  # latency jitter, CBR/churn sampling, and height-based stopping.
  java_compatible: true

network:
  profile: "bitcoin_2019"
  latency_matrix_file: "./data/latency.txt"

  # Java NetworkConfiguration 2019 bandwidth values.
  upload_bandwidth: [19200000, 20700000, 5800000, 15700000, 10200000, 11300000]
  download_bandwidth: [52000000, 40000000, 18000000, 22800000, 22800000, 29900000]

  # Java Bitcoin 2019 region distribution.
  region_distribution: [0.3316, 0.4998, 0.0090, 0.1177, 0.0224, 0.0195]

  # Java Bitcoin 2015 outbound-link cumulative degree distribution.
  degree_distribution:
    - 0.025
    - 0.050
    - 0.075
    - 0.10
    - 0.20
    - 0.30
    - 0.40
    - 0.50
    - 0.60
    - 0.70
    - 0.80
    - 0.85
    - 0.90
    - 0.95
    - 0.97
    - 0.97
    - 0.98
    - 0.99
    - 0.995
    - 1.0
